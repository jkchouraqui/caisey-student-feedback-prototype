<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAiSEY — Student Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #4457B7;
      --accent-hover: #3346A0;
      --accent-light: #EEF0FB;
      --bg:        #FEFCF7;
      --text:      #757488;
      --text-dark: #2D2B45;
      --text-muted:#B0AEBE;
      --card-bg:   #FFFFFF;
      --border:    #E8E6F2;
      --border-light: #F2F0F9;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 15px;
      letter-spacing: -0.5px;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--text-dark); }
    .header-sub   { font-size: 13px; color: var(--text-muted); margin-left: 6px; font-weight: 400; }

    /* Layout */
    .layout {
      display: flex;
      align-items: flex-start;
      max-width: 1120px;
      margin: 0 auto;
      padding: 36px 28px 72px;
      gap: 24px;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      display: none;
    }
    .sidebar.visible { display: block; }

    .sidebar-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted);
      padding: 0 2px 12px;
    }

    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .history-item:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(68,87,183,0.08);
    }
    .history-item.active { border-color: var(--accent); box-shadow: 0 2px 8px rgba(68,87,183,0.1); }

    .history-item-top {
      display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
    }
    .history-signal { font-size: 12px; font-weight: 600; }
    .history-date   { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .history-topic {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
      margin-bottom: 4px; cursor: text;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-topic:hover { color: var(--accent); }
    .history-topic-input {
      width: 100%; font-size: 13px; font-weight: 600;
      border: 1px solid var(--accent); border-radius: 4px;
      padding: 2px 6px; margin-bottom: 4px; outline: none;
      font-family: inherit; color: var(--text-dark);
    }

    /* Main */
    .main { flex: 1; min-width: 0; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(68,87,183,0.04);
    }
    .card-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      color: var(--text-dark);
      background: var(--bg);
      line-height: 1.65;
      min-height: 220px;
      resize: vertical;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px;
      padding: 11px 24px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      margin-top: 16px;
      font-family: inherit;
      letter-spacing: 0.1px;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 10px; padding: 14px 16px;
      font-size: 14px; color: #B91C1C; margin-bottom: 20px;
    }

    .info-box {
      background: var(--accent-light); border: 1px solid #C7CDEE;
      border-radius: 10px; padding: 14px 16px;
      font-size: 14px; color: var(--accent); margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .info-box-btn {
      background: none; border: 1px solid var(--accent); border-radius: 7px;
      padding: 5px 13px; font-size: 13px; font-weight: 600; color: var(--accent);
      cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: inherit;
    }
    .info-box-btn:hover { background: #D8DCF5; }

    /* Results */
    .results-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(68,87,183,0.04);
    }

    .domain-banner {
      padding: 26px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: flex-start; gap: 16px;
      background: linear-gradient(135deg, #F7F8FE 0%, var(--card-bg) 100%);
    }
    .dot {
      border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .dot-lg  { width: 16px; height: 16px; margin-top: 4px; }
    .dot-sm  { width: 11px; height: 11px; }

    .dot-strong     { background: #16A34A; }
    .dot-developing { background: #F59E0B; }
    .dot-needs-work { background: #DC2626; }
    .dot-not-demo   { background: #D1D5DB; }

    .col-strong     { color: #15803D; }
    .col-developing { color: #B45309; }
    .col-needs-work { color: #B91C1C; }
    .col-not-demo   { color: #9CA3AF; }

    .domain-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 5px;
    }
    .domain-signal { font-size: 20px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.3px; }

    .domain-summary {
      padding: 22px 26px; font-size: 15px; line-height: 1.7;
      color: var(--text); border-bottom: 1px solid var(--border-light);
    }

    .skills-header {
      padding: 16px 26px 8px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted);
    }

    .skill-row { border-top: 1px solid var(--border-light); }
    .skill-summary {
      display: flex; align-items: center; gap: 13px;
      padding: 17px 26px; cursor: pointer;
      transition: background 0.12s;
    }
    .skill-summary:hover { background: #F8F7FE; }
    .skill-name  { flex: 1; font-size: 15px; font-weight: 500; color: var(--text-dark); }
    .skill-level { font-size: 13px; font-weight: 600; margin-right: 6px; }
    .chevron { color: var(--text-muted); font-size: 11px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .skill-explanation {
      padding: 2px 26px 20px 52px;
      font-size: 14px; line-height: 1.7; color: var(--text);
      display: none;
    }
    .skill-explanation.open { display: block; }

    #results { display: none; }

    .sidebar-filters {
      display: flex; gap: 5px; flex-wrap: wrap;
      padding: 0 2px 10px;
    }
    .filter-chip {
      font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-muted);
      cursor: pointer; transition: all 0.12s;
      font-family: inherit;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .history-reeval {
      margin-top: 8px;
      font-size: 11px; font-weight: 600;
      color: var(--accent); background: none;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 10px; cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
      display: inline-block;
    }
    .history-reeval:hover { background: var(--accent-light); border-color: var(--accent); }

    .clear-history {
      display: block; margin-top: 12px;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 0 2px;
      transition: color 0.12s;
    }
    .clear-history:hover { color: #B91C1C; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">C</div>
  <div>
    <span class="header-title">CAiSEY</span>
    <span class="header-sub">Student Feedback</span>
  </div>
</div>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">History</div>
    <div class="sidebar-filters" id="sidebarFilters"></div>
    <div id="historyList"></div>
  </aside>

  <div class="main">

    <div class="card">
      <div class="card-label">Session Transcript</div>
      <textarea id="transcript" placeholder="Paste your CAiSEY debate transcript here.

Format each turn as:
Student: [student's message]
AI: [CAiSEY's message]"></textarea>
      <button class="btn" id="evalBtn" onclick="runEvaluation()">Evaluate</button>
    </div>

    <div class="error-box" id="errorBox" style="display:none"></div>
    <div class="info-box" id="infoBox" style="display:none">
      <span id="infoMsg"></span>
      <button class="info-box-btn" onclick="runEvaluation(true)">Re-evaluate anyway</button>
    </div>

    <div id="results" class="results-card">
      <div class="domain-banner">
        <span class="dot dot-lg" id="domainDot"></span>
        <div>
          <div class="domain-label" id="domainName"></div>
          <div class="domain-signal">
            Session Snapshot: <span id="domainSignalText"></span>
          </div>
        </div>
      </div>
      <div class="domain-summary" id="domainSummary"></div>
      <div class="skills-header">Skills breakdown</div>
      <div id="skillsContainer"></div>
    </div>

  </div>
</div>

<script>
  // ── History ──────────────────────────────────────────────
  let activeFilter = 'all';

  const FILTERS = [
    { label: 'All',        value: 'all' },
    { label: 'Strong',     value: 'strong' },
    { label: 'Developing', value: 'developing' },
    { label: 'Needs Work', value: 'needs-work' },
  ];

  function hashString(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) + h) + str.charCodeAt(i); h |= 0; }
    return h.toString(36);
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('caisey_history') || '[]'); } catch { return []; }
  }

  function updateHistoryTopic(id, topic) {
    const history = getHistory();
    const entry = history.find(e => e.id === id);
    if (entry) {
      entry.topic = topic;
      localStorage.setItem('caisey_history', JSON.stringify(history));
    }
  }

  function saveToHistory(transcript, result, duration) {
    const history = getHistory();
    const snippet = transcript.replace(/\n+/g, ' ').trim().slice(0, 60) + '…';
    const now = new Date();
    const date = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                + ', ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const entry = {
      id: Date.now(), date, snippet,
      topic: result.topic || 'Untitled session',
      signal: result.domain_signal,
      transcriptHash: hashString(transcript.trim()),
      transcript: transcript.trim(),
      duration, result
    };
    history.unshift(entry);
    localStorage.setItem('caisey_history', JSON.stringify(history.slice(0, 50)));
    return entry.id;
  }

  function renderFilters(activeId) {
    const container = document.getElementById('sidebarFilters');
    container.innerHTML = '';
    FILTERS.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip' + (activeFilter === f.value ? ' active' : '');
      btn.textContent = f.label;
      btn.addEventListener('click', () => { activeFilter = f.value; renderSidebar(activeId); });
      container.appendChild(btn);
    });
  }

  function renderSidebar(activeId) {
    const allHistory = getHistory();
    const sidebar = document.getElementById('sidebar');
    const list = document.getElementById('historyList');
    if (!allHistory.length) { sidebar.classList.remove('visible'); return; }
    sidebar.classList.add('visible');
    renderFilters(activeId);
    const history = activeFilter === 'all'
      ? allHistory
      : allHistory.filter(e => levelKey(e.signal) === activeFilter);
    list.innerHTML = '';
    if (!history.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'font-size:12px;color:var(--text-muted);padding:4px 2px';
      empty.textContent = 'No sessions match this filter.';
      list.appendChild(empty);
    }
    history.forEach(entry => {
      const key = levelKey(entry.signal);
      const durLabel = entry.duration != null ? `· ${entry.duration}s` : '';
      const item = document.createElement('div');
      item.className = 'history-item' + (entry.id === activeId ? ' active' : '');

      const topicEl = document.createElement('div');
      topicEl.className = 'history-topic';
      topicEl.title = 'Click to rename';
      topicEl.textContent = entry.topic || 'Untitled session';

      topicEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const input = document.createElement('input');
        input.className = 'history-topic-input';
        input.value = topicEl.textContent;
        topicEl.replaceWith(input);
        input.focus();
        input.select();
        const save = () => {
          const val = input.value.trim() || 'Untitled session';
          topicEl.textContent = val;
          input.replaceWith(topicEl);
          updateHistoryTopic(entry.id, val);
        };
        input.addEventListener('blur', save);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = topicEl.textContent; input.blur(); } });
      });

      const bottom = document.createElement('div');
      bottom.innerHTML = `
        <div class="history-item-top">
          <span class="dot dot-sm dot-${key}"></span>
          <span class="history-signal col-${key}">${entry.signal}</span>
        </div>
        <div class="history-date">${entry.date} ${durLabel}</div>
      `;

      item.appendChild(topicEl);
      item.appendChild(bottom);
      if (entry.transcript) {
        const reBtn = document.createElement('button');
        reBtn.className = 'history-reeval';
        reBtn.textContent = '↻ Re-evaluate';
        reBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          document.getElementById('transcript').value = entry.transcript;
          runEvaluation(true);
        });
        item.appendChild(reBtn);
      }
      item.addEventListener('click', () => renderResults(entry.result, entry.id));
      list.appendChild(item);
    });

    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-history';
    clearBtn.textContent = 'Clear history';
    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all history? This cannot be undone.')) {
        localStorage.removeItem('caisey_history');
        activeFilter = 'all';
        sidebar.classList.remove('visible');
        document.getElementById('results').style.display = 'none';
      }
    });
    list.appendChild(clearBtn);
  }

  // ── Timer ─────────────────────────────────────────────────
  let timerInterval = null;

  function startTimer() {
    const start = Date.now();
    const btn = document.getElementById('evalBtn');
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - start) / 1000);
      btn.innerHTML = `<span class="spinner"></span> Evaluating… ${s}s`;
    }, 500);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // ── UI helpers ────────────────────────────────────────────
  function levelKey(level) {
    if (!level) return 'not-demo';
    const l = level.toLowerCase();
    if (l === 'strong') return 'strong';
    if (l === 'developing') return 'developing';
    if (l.includes('needs')) return 'needs-work';
    return 'not-demo';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = msg ? 'block' : 'none';
    if (msg) document.getElementById('infoBox').style.display = 'none';
  }

  function showInfo(msg) {
    const box = document.getElementById('infoBox');
    if (!msg) { box.style.display = 'none'; return; }
    document.getElementById('infoMsg').textContent = msg;
    box.style.display = 'flex';
    document.getElementById('errorBox').style.display = 'none';
  }

  function setLoading(on) {
    const btn = document.getElementById('evalBtn');
    btn.disabled = on;
    if (on) {
      btn.innerHTML = '<span class="spinner"></span> Evaluating… 0s';
      startTimer();
    } else {
      stopTimer();
      btn.innerHTML = 'Evaluate';
    }
  }

  function renderResults(data, activeId) {
    const key = levelKey(data.domain_signal);
    document.getElementById('domainDot').className = `dot dot-lg dot-${key}`;
    document.getElementById('domainName').textContent = data.domain;
    const sig = document.getElementById('domainSignalText');
    sig.textContent = data.domain_signal;
    sig.className = `col-${key}`;
    document.getElementById('domainSummary').textContent = data.domain_summary;

    const container = document.getElementById('skillsContainer');
    container.innerHTML = '';
    (data.skills || []).forEach((skill, i) => {
      const sk = levelKey(skill.level);
      const row = document.createElement('div');
      row.className = 'skill-row';
      const summary = document.createElement('div');
      summary.className = 'skill-summary';
      summary.innerHTML = `
        <span class="dot dot-sm dot-${sk}"></span>
        <span class="skill-name">${skill.skill_name}</span>
        <span class="skill-level col-${sk}">${skill.level}</span>
        <span class="chevron" id="chev-${i}">▼</span>
      `;
      const explanation = document.createElement('div');
      explanation.className = 'skill-explanation';
      explanation.id = `exp-${i}`;
      explanation.textContent = skill.explanation;
      summary.addEventListener('click', () => {
        const open = explanation.classList.toggle('open');
        document.getElementById(`chev-${i}`).classList.toggle('open', open);
      });
      row.appendChild(summary);
      row.appendChild(explanation);
      container.appendChild(row);
    });

    document.getElementById('results').style.display = 'block';
    renderSidebar(activeId);
  }

  // ── Init ──────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    renderSidebar(null);
  });

  // ── Evaluate ──────────────────────────────────────────────
  async function runEvaluation(force = false) {
    const transcript = document.getElementById('transcript').value.trim();

    showError('');
    showInfo('');
    if (!transcript) { showError('Please paste a transcript first.'); return; }

    // Duplicate check
    if (!force) {
      const hash = hashString(transcript.trim());
      const existing = getHistory().find(e => e.transcriptHash === hash);
      if (existing) {
        showInfo('You\'ve already evaluated this transcript — showing the previous result.');
        renderResults(existing.result, existing.id);
        return;
      }
    }

    setLoading(true);
    document.getElementById('results').style.display = 'none';
    const start = Date.now();

    try {
      const res = await fetch('/api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript }),
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
      const result = JSON.parse(clean);
      const duration = Math.round((Date.now() - start) / 1000);
      const id = saveToHistory(transcript, result, duration);
      renderResults(result, id);

    } catch (e) {
      showError(e.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
