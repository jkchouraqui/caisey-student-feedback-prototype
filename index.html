<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAiSEY — Student Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
    }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-sub   { font-size: 13px; color: #888; margin-left: 4px; }

    .container { max-width: 780px; margin: 0 auto; padding: 32px 24px 64px; }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-label {
      font-size: 12px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }

    input[type="password"], textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus, textarea:focus { border-color: #1a1a1a; }
    input[type="password"] { font-family: monospace; }
    textarea { min-height: 220px; resize: vertical; line-height: 1.6; }
    textarea::placeholder { color: #bbb; }

    .api-hint { font-size: 12px; color: #aaa; margin-top: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px;
      padding: 11px 22px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      margin-top: 14px;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 14px 16px;
      font-size: 14px; color: #b91c1c; margin-bottom: 24px;
    }

    /* Results */
    .results-card {
      background: #fff; border: 1px solid #e5e5e5;
      border-radius: 12px; overflow: hidden;
    }

    .domain-banner {
      padding: 24px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .dot {
      border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .dot-lg  { width: 18px; height: 18px; margin-top: 3px; }
    .dot-sm  { width: 12px; height: 12px; }

    .dot-strong     { background: #16a34a; }
    .dot-developing { background: #facc15; }
    .dot-needs-work { background: #dc2626; }
    .dot-not-demo   { background: #d1d5db; }

    .col-strong     { color: #15803d; }
    .col-developing { color: #a16207; }
    .col-needs-work { color: #b91c1c; }
    .col-not-demo   { color: #9ca3af; }

    .domain-label  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #999; margin-bottom: 4px; }
    .domain-signal { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

    .domain-summary {
      padding: 20px 24px; font-size: 15px; line-height: 1.65;
      color: #333; border-bottom: 1px solid #f0f0f0;
    }

    .skills-header {
      padding: 14px 24px 8px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #bbb;
    }

    .skill-row { border-top: 1px solid #f0f0f0; }
    .skill-summary {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; cursor: pointer;
      transition: background 0.1s;
    }
    .skill-summary:hover { background: #fafafa; }
    .skill-name  { flex: 1; font-size: 15px; font-weight: 500; }
    .skill-level { font-size: 13px; font-weight: 600; margin-right: 6px; }
    .chevron { color: #ccc; font-size: 11px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .skill-explanation {
      padding: 0 24px 18px 48px;
      padding-top: 2px;
      font-size: 14px; line-height: 1.65; color: #555;
      display: none;
    }
    .skill-explanation.open { display: block; }

    #results { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">C</div>
  <div>
    <span class="header-title">CAiSEY</span>
    <span class="header-sub">Student Feedback</span>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-label">Session Transcript</div>
    <textarea id="transcript" placeholder="Paste your CAiSEY debate transcript here.

Format each turn as:
Student: [student's message]
AI: [CAiSEY's message]"></textarea>
    <button class="btn" id="evalBtn" onclick="runEvaluation()">Evaluate</button>
  </div>

  <div class="error-box" id="errorBox" style="display:none"></div>

  <div id="results" class="results-card">
    <div class="domain-banner">
      <span class="dot dot-lg" id="domainDot"></span>
      <div>
        <div class="domain-label" id="domainName"></div>
        <div class="domain-signal">
          Session Snapshot: <span id="domainSignalText"></span>
        </div>
      </div>
    </div>
    <div class="domain-summary" id="domainSummary"></div>
    <div class="skills-header">Skills breakdown</div>
    <div id="skillsContainer"></div>
  </div>

</div>

<script>
  function levelKey(level) {
    if (!level) return 'not-demo';
    const l = level.toLowerCase();
    if (l === 'strong') return 'strong';
    if (l === 'developing') return 'developing';
    if (l.includes('needs')) return 'needs-work';
    return 'not-demo';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = msg ? 'block' : 'none';
  }

  function setLoading(on) {
    const btn = document.getElementById('evalBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> Evaluating…'
      : 'Evaluate';
  }

  function renderResults(data) {
    const key = levelKey(data.domain_signal);

    // Domain dot + signal
    const dot = document.getElementById('domainDot');
    dot.className = `dot dot-lg dot-${key}`;

    document.getElementById('domainName').textContent = data.domain;

    const sig = document.getElementById('domainSignalText');
    sig.textContent = data.domain_signal;
    sig.className = `col-${key}`;

    document.getElementById('domainSummary').textContent = data.domain_summary;

    // Skills
    const container = document.getElementById('skillsContainer');
    container.innerHTML = '';
    (data.skills || []).forEach((skill, i) => {
      const sk = levelKey(skill.level);
      const row = document.createElement('div');
      row.className = 'skill-row';

      const summary = document.createElement('div');
      summary.className = 'skill-summary';
      summary.innerHTML = `
        <span class="dot dot-sm dot-${sk}"></span>
        <span class="skill-name">${skill.skill_name}</span>
        <span class="skill-level col-${sk}">${skill.level}</span>
        <span class="chevron" id="chev-${i}">▼</span>
      `;

      const explanation = document.createElement('div');
      explanation.className = 'skill-explanation';
      explanation.id = `exp-${i}`;
      explanation.textContent = skill.explanation;

      summary.addEventListener('click', () => {
        const open = explanation.classList.toggle('open');
        document.getElementById(`chev-${i}`).classList.toggle('open', open);
      });

      row.appendChild(summary);
      row.appendChild(explanation);
      container.appendChild(row);
    });

    document.getElementById('results').style.display = 'block';
  }

  async function runEvaluation() {
    const transcript = document.getElementById('transcript').value.trim();

    showError('');
    if (!transcript) { showError('Please paste a transcript first.'); return; }

    setLoading(true);
    document.getElementById('results').style.display = 'none';

    try {
      const res = await fetch('/api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript }),
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
      renderResults(JSON.parse(clean));

    } catch (e) {
      showError(e.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
