<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAiSEY — Student Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
    }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-sub   { font-size: 13px; color: #888; margin-left: 4px; }

    /* Layout */
    .layout {
      display: flex;
      align-items: flex-start;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      gap: 24px;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: none;
    }
    .sidebar.visible { display: block; }

    .sidebar-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #bbb;
      padding: 0 4px 10px;
    }

    .history-item {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .history-item:hover { border-color: #ccc; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .history-item.active { border-color: #1a1a1a; }

    .history-item-top {
      display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
    }
    .history-signal { font-size: 12px; font-weight: 600; }
    .history-date   { font-size: 11px; color: #aaa; margin-top: 2px; }
    .history-snippet {
      font-size: 12px; color: #666; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .history-topic {
      font-size: 13px; font-weight: 600; color: #1a1a1a;
      margin-bottom: 5px; cursor: text;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-topic:hover { color: #555; }
    .history-topic-input {
      width: 100%; font-size: 13px; font-weight: 600;
      border: 1px solid #1a1a1a; border-radius: 4px;
      padding: 2px 5px; margin-bottom: 5px; outline: none;
      font-family: inherit;
    }

    .main { flex: 1; min-width: 0; }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-label {
      font-size: 12px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }

    input[type="password"], textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus, textarea:focus { border-color: #1a1a1a; }
    input[type="password"] { font-family: monospace; }
    textarea { min-height: 220px; resize: vertical; line-height: 1.6; }
    textarea::placeholder { color: #bbb; }

    .api-hint { font-size: 12px; color: #aaa; margin-top: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px;
      padding: 11px 22px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      margin-top: 14px;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 14px 16px;
      font-size: 14px; color: #b91c1c; margin-bottom: 24px;
    }

    .info-box {
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: 8px; padding: 14px 16px;
      font-size: 14px; color: #92400e; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .info-box-btn {
      background: none; border: 1px solid #d97706; border-radius: 6px;
      padding: 5px 12px; font-size: 13px; font-weight: 600; color: #92400e;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .info-box-btn:hover { background: #fef3c7; }

    /* Results */
    .results-card {
      background: #fff; border: 1px solid #e5e5e5;
      border-radius: 12px; overflow: hidden;
    }

    .domain-banner {
      padding: 24px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .dot {
      border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .dot-lg  { width: 18px; height: 18px; margin-top: 3px; }
    .dot-sm  { width: 12px; height: 12px; }

    .dot-strong     { background: #16a34a; }
    .dot-developing { background: #facc15; }
    .dot-needs-work { background: #dc2626; }
    .dot-not-demo   { background: #d1d5db; }

    .col-strong     { color: #15803d; }
    .col-developing { color: #a16207; }
    .col-needs-work { color: #b91c1c; }
    .col-not-demo   { color: #9ca3af; }

    .domain-label  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #999; margin-bottom: 4px; }
    .domain-signal { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

    .domain-summary {
      padding: 20px 24px; font-size: 15px; line-height: 1.65;
      color: #333; border-bottom: 1px solid #f0f0f0;
    }

    .skills-header {
      padding: 14px 24px 8px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #bbb;
    }

    .skill-row { border-top: 1px solid #f0f0f0; }
    .skill-summary {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; cursor: pointer;
      transition: background 0.1s;
    }
    .skill-summary:hover { background: #fafafa; }
    .skill-name  { flex: 1; font-size: 15px; font-weight: 500; }
    .skill-level { font-size: 13px; font-weight: 600; margin-right: 6px; }
    .chevron { color: #ccc; font-size: 11px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .skill-explanation {
      padding: 0 24px 18px 48px;
      padding-top: 2px;
      font-size: 14px; line-height: 1.65; color: #555;
      display: none;
    }
    .skill-explanation.open { display: block; }

    #results { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">C</div>
  <div>
    <span class="header-title">CAiSEY</span>
    <span class="header-sub">Student Feedback</span>
  </div>
</div>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">History</div>
    <div id="historyList"></div>
  </aside>

  <div class="main">

    <div class="card">
      <div class="card-label">Session Transcript</div>
      <textarea id="transcript" placeholder="Paste your CAiSEY debate transcript here.

Format each turn as:
Student: [student's message]
AI: [CAiSEY's message]"></textarea>
      <button class="btn" id="evalBtn" onclick="runEvaluation()">Evaluate</button>
    </div>

    <div class="error-box" id="errorBox" style="display:none"></div>
    <div class="info-box" id="infoBox" style="display:none">
      <span id="infoMsg"></span>
      <button class="info-box-btn" onclick="runEvaluation(true)">Re-evaluate anyway</button>
    </div>

    <div id="results" class="results-card">
      <div class="domain-banner">
        <span class="dot dot-lg" id="domainDot"></span>
        <div>
          <div class="domain-label" id="domainName"></div>
          <div class="domain-signal">
            Session Snapshot: <span id="domainSignalText"></span>
          </div>
        </div>
      </div>
      <div class="domain-summary" id="domainSummary"></div>
      <div class="skills-header">Skills breakdown</div>
      <div id="skillsContainer"></div>
    </div>

  </div>
</div>

<script>
  // ── History ──────────────────────────────────────────────
  function hashString(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) + h) + str.charCodeAt(i); h |= 0; }
    return h.toString(36);
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('caisey_history') || '[]'); } catch { return []; }
  }

  function updateHistoryTopic(id, topic) {
    const history = getHistory();
    const entry = history.find(e => e.id === id);
    if (entry) {
      entry.topic = topic;
      localStorage.setItem('caisey_history', JSON.stringify(history));
    }
  }

  function saveToHistory(transcript, result, duration) {
    const history = getHistory();
    const snippet = transcript.replace(/\n+/g, ' ').trim().slice(0, 60) + '…';
    const now = new Date();
    const date = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                + ', ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const entry = {
      id: Date.now(), date, snippet,
      topic: result.topic || 'Untitled session',
      signal: result.domain_signal,
      transcriptHash: hashString(transcript.trim()),
      duration, result
    };
    history.unshift(entry);
    localStorage.setItem('caisey_history', JSON.stringify(history.slice(0, 50)));
    return entry.id;
  }

  function renderSidebar(activeId) {
    const history = getHistory();
    const sidebar = document.getElementById('sidebar');
    const list = document.getElementById('historyList');
    if (!history.length) { sidebar.classList.remove('visible'); return; }
    sidebar.classList.add('visible');
    list.innerHTML = '';
    history.forEach(entry => {
      const key = levelKey(entry.signal);
      const durLabel = entry.duration != null ? `· ${entry.duration}s` : '';
      const item = document.createElement('div');
      item.className = 'history-item' + (entry.id === activeId ? ' active' : '');

      const topicEl = document.createElement('div');
      topicEl.className = 'history-topic';
      topicEl.title = 'Click to rename';
      topicEl.textContent = entry.topic || 'Untitled session';

      topicEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const input = document.createElement('input');
        input.className = 'history-topic-input';
        input.value = topicEl.textContent;
        topicEl.replaceWith(input);
        input.focus();
        input.select();
        const save = () => {
          const val = input.value.trim() || 'Untitled session';
          topicEl.textContent = val;
          input.replaceWith(topicEl);
          updateHistoryTopic(entry.id, val);
        };
        input.addEventListener('blur', save);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = topicEl.textContent; input.blur(); } });
      });

      const bottom = document.createElement('div');
      bottom.innerHTML = `
        <div class="history-item-top">
          <span class="dot dot-sm dot-${key}"></span>
          <span class="history-signal col-${key}">${entry.signal}</span>
        </div>
        <div class="history-date">${entry.date} ${durLabel}</div>
      `;

      item.appendChild(topicEl);
      item.appendChild(bottom);
      item.addEventListener('click', () => renderResults(entry.result, entry.id));
      list.appendChild(item);
    });
  }

  // ── Timer ─────────────────────────────────────────────────
  let timerInterval = null;

  function startTimer() {
    const start = Date.now();
    const btn = document.getElementById('evalBtn');
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - start) / 1000);
      btn.innerHTML = `<span class="spinner"></span> Evaluating… ${s}s`;
    }, 500);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // ── UI helpers ────────────────────────────────────────────
  function levelKey(level) {
    if (!level) return 'not-demo';
    const l = level.toLowerCase();
    if (l === 'strong') return 'strong';
    if (l === 'developing') return 'developing';
    if (l.includes('needs')) return 'needs-work';
    return 'not-demo';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = msg ? 'block' : 'none';
    if (msg) document.getElementById('infoBox').style.display = 'none';
  }

  function showInfo(msg) {
    const box = document.getElementById('infoBox');
    if (!msg) { box.style.display = 'none'; return; }
    document.getElementById('infoMsg').textContent = msg;
    box.style.display = 'flex';
    document.getElementById('errorBox').style.display = 'none';
  }

  function setLoading(on) {
    const btn = document.getElementById('evalBtn');
    btn.disabled = on;
    if (on) {
      btn.innerHTML = '<span class="spinner"></span> Evaluating… 0s';
      startTimer();
    } else {
      stopTimer();
      btn.innerHTML = 'Evaluate';
    }
  }

  function renderResults(data, activeId) {
    const key = levelKey(data.domain_signal);
    document.getElementById('domainDot').className = `dot dot-lg dot-${key}`;
    document.getElementById('domainName').textContent = data.domain;
    const sig = document.getElementById('domainSignalText');
    sig.textContent = data.domain_signal;
    sig.className = `col-${key}`;
    document.getElementById('domainSummary').textContent = data.domain_summary;

    const container = document.getElementById('skillsContainer');
    container.innerHTML = '';
    (data.skills || []).forEach((skill, i) => {
      const sk = levelKey(skill.level);
      const row = document.createElement('div');
      row.className = 'skill-row';
      const summary = document.createElement('div');
      summary.className = 'skill-summary';
      summary.innerHTML = `
        <span class="dot dot-sm dot-${sk}"></span>
        <span class="skill-name">${skill.skill_name}</span>
        <span class="skill-level col-${sk}">${skill.level}</span>
        <span class="chevron" id="chev-${i}">▼</span>
      `;
      const explanation = document.createElement('div');
      explanation.className = 'skill-explanation';
      explanation.id = `exp-${i}`;
      explanation.textContent = skill.explanation;
      summary.addEventListener('click', () => {
        const open = explanation.classList.toggle('open');
        document.getElementById(`chev-${i}`).classList.toggle('open', open);
      });
      row.appendChild(summary);
      row.appendChild(explanation);
      container.appendChild(row);
    });

    document.getElementById('results').style.display = 'block';
    renderSidebar(activeId);
  }

  // ── Init ──────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    renderSidebar(null);
  });

  // ── Evaluate ──────────────────────────────────────────────
  async function runEvaluation(force = false) {
    const transcript = document.getElementById('transcript').value.trim();

    showError('');
    showInfo('');
    if (!transcript) { showError('Please paste a transcript first.'); return; }

    // Duplicate check
    if (!force) {
      const hash = hashString(transcript.trim());
      const existing = getHistory().find(e => e.transcriptHash === hash);
      if (existing) {
        showInfo('You\'ve already evaluated this transcript — showing the previous result.');
        renderResults(existing.result, existing.id);
        return;
      }
    }

    setLoading(true);
    document.getElementById('results').style.display = 'none';
    const start = Date.now();

    try {
      const res = await fetch('/api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript }),
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
      const result = JSON.parse(clean);
      const duration = Math.round((Date.now() - start) / 1000);
      const id = saveToHistory(transcript, result, duration);
      renderResults(result, id);

    } catch (e) {
      showError(e.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
